spring:
  application:
    name: balance-transfer-service
  web:
    # Always use English for API responses.
    locale: en_US
    locale-resolver: fixed
  datasource:
    url: jdbc:mysql://localhost:3306/taskdb?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=utf8
    username: taskuser
    password: taskpass
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
  cache:
    type: redis
    cache-names: userBalances
    redis:
      time-to-live: 60s

rocketmq:
  name-server: 127.0.0.1:9876
  producer:
    group: user-balance-producer-group
    vip-channel-enabled: false
    send-msg-timeout-ms: 3000
  consumer:
    group: user-balance-consumer-group
    vip-channel-enabled: false

server:
  port: 8080
